<mat-form-field appearance="outline">
  <mat-label>{{ label }}</mat-label>
  <mat-icon *ngIf="icon" matPrefix>{{ icon }}</mat-icon>
  <input
    matInput
    [type]="visible ? 'text' : 'password'"
    [placeholder]="placeholder"
    [autocomplete]="autocomplete"
    [formControl]="$any(control)"
  />
  <button mat-button matSuffix type="button" (click)="toggleVisibility()">
    <mat-icon>{{ visible ? 'visibility_off' : 'visibility' }}</mat-icon>
  </button>
  <mat-hint *ngIf="hint">{{ hint }}</mat-hint>
  <mat-error *ngIf="hasError('required')">{{ label }} é obrigatório</mat-error>
  <mat-error *ngIf="hasError('minlength')">{{ label }} demasiado curta</mat-error>
  <mat-error *ngIf="hasError('strongPassword')">A password não cumpre os requisitos mínimos</mat-error>
  <mat-error *ngIf="hasError('fieldsMismatch')">Os valores não coincidem</mat-error>
</mat-form-field>
